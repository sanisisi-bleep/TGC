name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          set -e
          if npm ci --no-audit --no-fund; then
            echo "Frontend dependencies installed with npm ci"
          else
            echo "npm ci failed. Retrying with npm install to recover from lockfile usage issues."
            npm install --no-audit --no-fund
          fi

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-smoke:
    name: Backend smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall backend

      - name: Import backend app
        env:
          INIT_DB_ON_STARTUP: "false"
        run: |
          python -c "import pathlib, sys; sys.path.append(str(pathlib.Path('backend').resolve())); import app.main; print('backend import ok')"
