services:
  frontend:
    build:
      context: ./frontend
    container_name: tgc-frontend
    environment:
      HOST: 0.0.0.0
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
    ports:
      - "3000:3000"
    restart: unless-stopped

  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    container_name: tgc-cloudflared-quick
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - quick

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tgc-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    restart: unless-stopped
    profiles:
      - managed
